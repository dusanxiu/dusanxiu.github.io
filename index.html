<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今夜音律运势</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // Tailwind 自定义配置 - 宝蓝色系
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0066CC', // 主色调：宝蓝
                        secondary: '#0088FF', // 辅助色：亮宝蓝
                        accent: '#40A9FF',    // 点缀色：浅宝蓝
                        dark: '#003366',      // 深色宝蓝背景
                    },
                    fontFamily: {
                        lucky: ['"Ma Shan Zheng"', 'cursive'],
                        sans: ['Inter', 'system-ui'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 0 10px rgba(64, 169, 255, 0.8);
            }
            .glow {
                box-shadow: 0 0 20px rgba(0, 136, 255, 0.6);
            }
            .shake {
                animation: shake 0.5s ease-in-out;
            }
            .fade-in {
                animation: fadeIn 1s ease forwards;
            }
            .note-float {
                animation: float 3s ease-in-out infinite;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 引入书法字体 */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        
        /* 背景图片样式 */
        .bg-custom-image {
            background-image: url('https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/b620c8041dfa45df89c4bd16c8a4e032.png~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=20260415123257E583B8A5D26322A2A0C6&rrcfp=dafada99&x-expires=2092451577&x-signature=cCK2oK87lfAroadjMQe%2B7%2FNNJtw%3D');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* 背景遮罩，提升文字可读性 */
        .bg-overlay {
            background-color: rgba(0, 0, 0, 0.4);
        }

        /* 鹰角音乐播放器样式 */
        .monster-siren-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 120px;
            border: none;
            border-radius: 8px;
            opacity: 0.8;
            transition: opacity 0.3s;
            z-index: 10;
        }
        .monster-siren-player:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen bg-custom-image bg-overlay flex flex-col items-center justify-center p-5 text-white overflow-hidden">
    <!-- 嵌入鹰角官方《春弦》播放器（100%能播） -->
    <iframe class="monster-siren-player"
        src="https://monster-siren.hypergryph.com/music/232200"
        frameborder="0"
        allow="autoplay; encrypted-media">
    </iframe>

    <!-- 漂浮音符装饰 - 宝蓝色系 -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <i class="fa fa-music absolute top-[10%] left-[10%] text-accent/30 text-2xl note-float" style="animation-delay: 0s;"></i>
        <i class="fa fa-music absolute top-[20%] right-[15%] text-secondary/20 text-xl note-float" style="animation-delay: 0.5s;"></i>
        <i class="fa fa-music absolute bottom-[15%] left-[20%] text-primary/25 text-3xl note-float" style="animation-delay: 1s;"></i>
        <i class="fa fa-music absolute bottom-[25%] right-[10%] text-accent/20 text-2xl note-float" style="animation-delay: 1.5s;"></i>
    </div>

    <!-- 标题 - 宝蓝色渐变 + 加粗 -->
    <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-lucky font-black text-shadow text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-accent to-primary">
        今夜音律运势
    </h1>

    <!-- 抽签展示区 -->
    <div id="lottery-box" class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-2xl p-8 flex flex-col items-center justify-center min-h-[200px] mb-10 border border-white/20 glow transition-all">
        <p id="result-text" class="text-[clamp(1.5rem,4vw,2.5rem)] font-lucky text-center text-shadow fade-in">
            点击下方抽签，获取你的专属音律运势
        </p>
    </div>

    <!-- 抽签按钮 - 宝蓝色渐变 -->
    <button id="draw-btn" class="bg-gradient-to-r from-primary to-secondary hover:from-secondary hover:to-accent px-8 py-4 rounded-full text-xl font-bold transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 active:scale-95">
        点击抽签
    </button>

    <!-- 底部说明 -->
    <p class="mt-8 text-white/80 text-sm text-center">
        凯尔希保佑！ ✨
    </p>

    <script>
        // 抽签核心逻辑
        const lots = [
            "欧气爆棚，一发入魂！",
            "旗开得胜，一举成功！",
            "会赢的",
			"C 档势在必得好吧"
        ];
        const drawBtn = document.getElementById('draw-btn');
        const resultText = document.getElementById('result-text');
        const lotteryBox = document.getElementById('lottery-box');

        drawBtn.addEventListener('click', () => {
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-70', 'cursor-not-allowed');
            lotteryBox.classList.add('shake');

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * lots.length);
                resultText.textContent = lots[randomIndex];
                lotteryBox.classList.remove('shake');

                setTimeout(() => {
                    drawBtn.disabled = false;
                    drawBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }, 500);
            }, 800);
        });
    </script>
</body>
</html>
